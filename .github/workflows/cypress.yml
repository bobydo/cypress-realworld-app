name: Cypress Tests
on: [push]

# on:
#   schedule:
#     - cron: "0 2 * * *"
# Run on a schedule (e.g., every day at 2:00 UTC).

jobs:
  # ─── Stage 1: Smoke (fast check, ~5 min) ───────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # job timeout minutes
    steps:
      - uses: actions/checkout@v6
      - name: Smoke Tests
        uses: cypress-io/github-action@v7
        with:
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 60 # seconds to get app reponse before failing the job
          spec: "cypress/tests/ui/auth.spec.ts,cypress/tests/ui/bankaccounts.spec.ts"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Stage 2: Full Regression (UI + API) ──────────────────────────────────
  regression:
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30 # minutes for the longest spec to run
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2] # Spins up 2 separate GitHub Actions runner machines.
                           # Each runner registers with Cypress Cloud (record: true).
                           # Cypress Cloud assigns spec files across both runners using
                           # historical run durations — longest specs are assigned first
                           # so both runners finish at roughly the same time (greedy
                           # load balancing). First-ever run has no history so assignment
                           # is arbitrary; from the second run onward it is optimized.
    steps:
      - uses: actions/checkout@v6
      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT
      - name: Regression Tests
        # Uses the official Cypress GitHub action https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7
        with:
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 60 # seconds to get app reponse before failing the job
          # Records to Cypress Cloud https://docs.cypress.io/cloud/get-started/setup
          record: true
          parallel: true # Runs test in parallel using settings above
        env:
          # For recording and parallelization you must set your CYPRESS_RECORD_KEY
          # in GitHub repo → Settings → Secrets → Actions
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report-html-container-${{ matrix.containers }}-${{ steps.timestamp.outputs.value }}
          path: cypress/logs/*.html
      - name: Upload JSON report (Xray import)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report-json-container-${{ matrix.containers }}-${{ steps.timestamp.outputs.value }}
          path: cypress/logs/*.json
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-failed-container-${{ matrix.containers }}-${{ steps.timestamp.outputs.value }}
          path: cypress/screenshots/
      # ── Rerun: only when this container had failures ──────────────────────────
      # Stays inside the regression job so it is not a weird always-visible peer job.
      # Each matrix container reruns only its own failed specs with video ON.
      - name: Find failed specs in this container
        id: failed
        if: failure()
        run: |
          SPECS=$(node -e "
            const fs = require('fs');
            const files = fs.readdirSync('cypress/logs').filter(f => f.endsWith('.json'));
            const failed = new Set();
            files.forEach(f => {
              const data = JSON.parse(fs.readFileSync('cypress/logs/' + f, 'utf8'));
              (data.results || []).forEach(r => {
                const hasFail = (suites) => (suites || []).some(s =>
                  (s.tests || []).some(t => t.fail) || hasFail(s.suites));
                if (hasFail(r.suites || [])) failed.add(r.file);
              });
            });
            console.log([...failed].join(','));
          ")
          echo "specs=$SPECS" >> $GITHUB_OUTPUT
          echo "Failed specs: $SPECS"
      - name: Rerun failed specs with video
        if: failure() && steps.failed.outputs.specs != ''
        uses: cypress-io/github-action@v7
        with:
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 60 # seconds to get app reponse before failing the job
          spec: ${{ steps.failed.outputs.specs }}
        env:
          CYPRESS_VIDEO: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload rerun videos
        if: failure() && steps.failed.outputs.specs != ''
        uses: actions/upload-artifact@v4
        with:
          name: cypress-rerun-videos-container-${{ matrix.containers }}-${{ steps.timestamp.outputs.value }}
          path: cypress/videos/

  # ─── Stage 3: Performance — k6 (after regression) ──────────────────────────
  # Install: no local install needed — uses grafana/k6-action which pulls k6
  # Script:  performance/load-test.js
  performance:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Start backend
        run: npm start &
      - name: Wait for backend
        run: npx wait-on http://localhost:3001
      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT
      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: cypress/tests/performance/load-test.spec.ts
          flags: --compatibility-mode=extended --out json=cypress/tests/performance/k6-results.json
      - name: Upload k6 report
        uses: actions/upload-artifact@v4
        if: always()   # upload even if thresholds failed
        with:
          name: k6-performance-report-${{ steps.timestamp.outputs.value }}
          path: cypress/tests/performance/k6-results.json

  # ─── Stage 4: Security — OWASP ZAP (main branch only) ──────────────────────
  # Install: no local install needed — uses zaproxy/action-baseline Docker image
  # Runs only on main to avoid noise on every feature branch PR
  security:
    runs-on: ubuntu-latest
    needs: regression
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT
      - name: Start app
        run: npm start &
      - name: Wait for app
        run: npx wait-on http://localhost:3000
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          report_html: cypress/tests/security/zap-report.html
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report-${{ steps.timestamp.outputs.value }}
          path: cypress/tests/security/zap-report.html
